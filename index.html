<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CoachFlow</title>
  <script src="https://unpkg.com/parse/dist/parse.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0f0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .page { display: none; }
    .page.active { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── AUTH PAGE ── */
    #auth-page {
      justify-content: center;
      align-items: center;
      padding: 24px;
      background: radial-gradient(ellipse at top, #0d1f0d 0%, #0a0f0a 70%);
    }

    .auth-box {
      background: #111811;
      border: 1px solid #1e3a1e;
      border-radius: 16px;
      padding: 40px 32px;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 {
      font-size: 30px;
      font-weight: 800;
      color: #22c55e;
      letter-spacing: -0.5px;
    }

    .logo p {
      font-size: 13px;
      color: #6b7280;
      margin-top: 4px;
    }

    .tabs {
      display: flex;
      background: #0a0f0a;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: #6b7280;
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: #22c55e;
      color: #000;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      background: #0a0f0a;
      border: 1px solid #1e3a1e;
      border-radius: 10px;
      color: #f0f0f0;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    .form-group input:focus {
      border-color: #22c55e;
    }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: #22c55e;
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }

    .btn-primary:hover { background: #16a34a; }
    .btn-primary:disabled { background: #1e3a1e; color: #555; cursor: not-allowed; }

    .msg {
      text-align: center;
      font-size: 13px;
      margin-top: 14px;
      min-height: 18px;
    }

    .msg.error { color: #f87171; }
    .msg.success { color: #22c55e; }

    /* ── DASHBOARD ── */
    #dashboard-page { flex-direction: column; }

    .topbar {
      background: #111811;
      border-bottom: 1px solid #1e3a1e;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .topbar h2 {
      font-size: 18px;
      font-weight: 700;
      color: #22c55e;
    }

    .btn-logout {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid #1e3a1e;
      color: #9ca3af;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logout:hover { border-color: #f87171; color: #f87171; }

    .dashboard-content {
      padding: 28px 24px;
      flex: 1;
    }

    .welcome-card {
      background: linear-gradient(135deg, #0d2a0d, #111811);
      border: 1px solid #1e3a1e;
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 28px;
    }

    .welcome-card h3 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .welcome-card p {
      color: #9ca3af;
      font-size: 14px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: #111811;
      border: 1px solid #1e3a1e;
      border-radius: 12px;
      padding: 20px;
    }

    .stat-card .number {
      font-size: 28px;
      font-weight: 800;
      color: #22c55e;
    }

    .stat-card .label {
      font-size: 12px;
      color: #6b7280;
      margin-top: 4px;
    }

    .section-title {
      font-size: 12px;
      font-weight: 700;
      color: #6b7280;
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .coming-soon {
      background: #111811;
      border: 1px dashed #1e3a1e;
      border-radius: 12px;
      padding: 32px;
      text-align: center;
      color: #4b5563;
      font-size: 14px;
    }

    .coming-soon span {
      display: block;
      font-size: 28px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <!-- AUTH PAGE -->
  <div id="auth-page" class="page active">
    <div class="auth-box">
      <div class="logo">
        <h1>CoachFlow</h1>
        <p>Your entire coaching business, in one place.</p>
      </div>

      <div class="tabs">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- LOGIN -->
      <div id="form-login">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="coach@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" />
        </div>
        <button class="btn-primary" onclick="login()">Log In</button>
        <p class="msg" id="login-msg"></p>
      </div>

      <!-- SIGNUP -->
      <div id="form-signup" style="display:none;">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="signup-name" placeholder="Your first name" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signup-email" placeholder="coach@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="Minimum 6 characters" />
        </div>
        <button class="btn-primary" onclick="signup()">Create Account</button>
        <p class="msg" id="signup-msg"></p>
      </div>
    </div>
  </div>

  <!-- DASHBOARD PAGE -->
  <div id="dashboard-page" class="page">
    <div class="topbar">
      <h2>CoachFlow</h2>
      <button class="btn-logout" onclick="logout()">Log Out</button>
    </div>
    <div class="dashboard-content">
      <div class="welcome-card">
        <h3>Welcome, <span id="coach-name">Coach</span> 👋</h3>
        <p>Here's your CoachFlow dashboard.</p>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="number">0</div>
          <div class="label">Clients</div>
        </div>
        <div class="stat-card">
          <div class="number">0</div>
          <div class="label">Sessions</div>
        </div>
      </div>

      <p class="section-title">Features</p>
      <div class="coming-soon">
        <span>🚀</span>
        Client & session management — coming soon
      </div>
    </div>
  </div>

  <script>
    Parse.initialize(
      "mhmq0eeLycsl0VMveapFUY3fkyClJDahxUM3X9OC",
      "VNyFkAPaWcu22RlGvgDxNtknmFZkgvwSVv3dyy6K"
    );
    Parse.serverURL = "https://parseapi.back4app.com/";

    function switchTab(tab) {
      document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
    }

    function showPage(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    async function login() {
      const email = document.getElementById('login-email').value.trim();
      const pass = document.getElementById('login-password').value;
      const msg = document.getElementById('login-msg');
      msg.className = 'msg';
      msg.textContent = 'Logging in...';
      try {
        const user = await Parse.User.logIn(email, pass);
        msg.className = 'msg success';
        msg.textContent = 'Success!';
        loadDashboard(user);
      } catch(e) {
        msg.className = 'msg error';
        msg.textContent = e.message || 'Login failed.';
      }
    }

    async function signup() {
      const name = document.getElementById('signup-name').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const pass = document.getElementById('signup-password').value;
      const msg = document.getElementById('signup-msg');
      msg.className = 'msg';
      msg.textContent = 'Creating account...';
      try {
        const user = new Parse.User();
        user.set('username', email);
        user.set('email', email);
        user.set('password', pass);
        user.set('name', name);
        await user.signUp();
        msg.className = 'msg success';
        msg.textContent = 'Account created!';
        loadDashboard(user);
      } catch(e) {
        msg.className = 'msg error';
        msg.textContent = e.message || 'Sign up failed.';
      }
    }

    async function logout() {
      await Parse.User.logOut();
      showPage('auth-page');
    }

    function loadDashboard(user) {
      const name = user.get('name') || user.get('username') || 'Coach';
      document.getElementById('coach-name').textContent = name;
      showPage('dashboard-page');
    }

    (async () => {
      const current = await Parse.User.currentAsync();
      if (current) loadDashboard(current);
    })();
  </script>
</body>
    </html>
